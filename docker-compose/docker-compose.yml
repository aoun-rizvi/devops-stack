services:
  startup-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: startup-devops-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
