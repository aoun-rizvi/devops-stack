apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-api
  namespace: devops-stack
  labels:
    app: startup-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: startup-api
  template:
    metadata:
      labels:
        app: startup-api
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: startup-api
          image: devops-stack-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: startup-api-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
