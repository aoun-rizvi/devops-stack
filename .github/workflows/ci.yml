name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate application, Terraform, and Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install app dependencies
        working-directory: docker-compose/app
        run: npm install

      - name: Run app tests
        working-directory: docker-compose/app
        run: npm test

      - name: Build Docker image
        run: docker build -t devops-stack-api:${{ github.sha }} docker-compose/app

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -recursive -check

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s/overlays/dev > rendered-manifests.yaml

      - name: Kubernetes client-side validation
        run: kubectl apply --dry-run=client -f rendered-manifests.yaml
